# Cloudflare Worker for the agami telemetry endpoint.
#
# Deploy:
#   cd services/telemetry-endpoint
#   npm install
#   npx wrangler deploy
#
# Required one-time setup (from the Cloudflare dashboard or `wrangler` CLI):
#   - Create an R2 bucket named `agami-telemetry`
#   - Enable Bot Fight Mode at the zone level for analytics.agami.ai
#   - Configure the rate limiter binding values below

name = "agami-telemetry"
main = "src/worker.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain for the endpoint
routes = [
  { pattern = "analytics.agami.ai/v1/events", custom_domain = true }
]

[[r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "agami-telemetry"

# Rate limit: 100 requests per IP per minute. Tightens to 10/min after a sustained
# burst — captures bot traffic without breaking legitimate batched flushes (a normal
# user sends one batch per day).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"

[unsafe.bindings.simple]
limit = 100
period = 60
