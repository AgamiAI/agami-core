name: agami-example
description: 'Acme Store — a small example online retailer with two sides: one-time commerce (customers,
  products, orders, line items, payments, refunds) and recurring subscriptions (plans, subscriptions,
  subscription events, invoices). Query it for sales and revenue, product/category performance, refunds,
  channel and order-status breakdowns, and subscription metrics like active subscriptions and MRR.'
default_time_window: null
