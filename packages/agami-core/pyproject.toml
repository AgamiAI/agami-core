# agami-core — the importable library behind the agami skill, the hosted MCP server
# (ACE-001), and the future private consumer (agami, F6). Relocated out of
# plugins/agami/scripts/ by OCR-028 so all three import ONE package.
#
# Flat top-level module names (semantic_model, mcp_harness, execute_sql, agami_paths)
# are an invariant: the consumer's imports must resolve unchanged (REQ-003). src/ layout
# keeps the importable names flat while keeping the move out of an accidental-import top level.

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agami-core"
version = "0.3.0"
description = "agami-core — governed semantic model, the shared MCP TOOLS harness, and the unified local query executor."
readme = "README.md"
requires-python = ">=3.10"
license = "LicenseRef-Agami-FUL"
authors = [{ name = "Agami AI", email = "skills@agami.ai" }]
# The executor + stdio harness are deliberately pure-stdlib (the local no-egress executor
# runs SQL with only a DB driver). The model deps live in the [model] extra so the
# Python-driver tier stays lean; `sm` / the server install [model].
dependencies = []

[project.optional-dependencies]
model = [
  "pydantic>=2,<3",
  "PyYAML>=6",
  "sqlglot>=20",
]

[tool.setuptools]
package-dir = { "" = "src" }
# Flat top-level modules (not under a parent package) — listed explicitly so the import
# names stay flat regardless of disk layout.
py-modules = ["agami_paths", "execute_sql", "mcp_harness"]
packages = ["semantic_model"]

[tool.setuptools.package-data]
semantic_model = ["requirements.txt"]
