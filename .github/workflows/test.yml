name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml jsonschema sqlglot

      # Excludes tests/integration/ (needs Docker, runs locally only).
      # Model-graded skill evals (tools/run_skill_evals.py) and the TPC-DS
      # benchmark (benchmarks/tpcds/) are intentionally not run here —
      # they cost API tokens and require ANTHROPIC_API_KEY.
      - name: Run pytest
        run: python -m pytest tests/ -q --ignore=tests/integration
